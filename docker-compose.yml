version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: esquadrias-db
    environment:
      POSTGRES_USER: esquadrias
      POSTGRES_PASSWORD: Esq2026!Secure
      POSTGRES_DB: esquadrias
    ports:
      - "5436:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U esquadrias"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
